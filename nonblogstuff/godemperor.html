<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God Emperor - Brian Lui's blog</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            max-width: 56rem;
        }

        article {
            margin-top: 2rem;
        }

        .carousel {
            margin: 2rem auto;
            max-width: 48rem;
        }

        .carousel-frame {
            aspect-ratio: 1 / 1;
            background: #f4f4f4;
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
        }

        .carousel-frame img {
            display: block;
            width: 100%;
            height: 100%;
            margin: 0;
            object-fit: contain;
            background: #fff;
        }

        .carousel-toolbar {
            display: grid;
            grid-template-columns: 2.75rem 1fr 2.75rem;
            gap: 0.75rem;
            align-items: center;
            margin-top: 0.75rem;
        }

        .carousel-button {
            width: 2.75rem;
            height: 2.75rem;
            border: 1px solid #bbb;
            border-radius: 6px;
            background: #fff;
            color: #222;
            cursor: pointer;
            font-size: 1.4rem;
            line-height: 1;
        }

        .carousel-button:hover,
        .carousel-button:focus-visible {
            border-color: #222;
            outline: none;
        }

        .carousel-status {
            margin: 0;
            text-align: center;
            color: #555;
            font-size: 0.95rem;
        }

        .thumbnail-strip {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            padding-bottom: 0.25rem;
            overflow-x: auto;
            scrollbar-width: thin;
        }

        .thumbnail-button {
            flex: 0 0 4.75rem;
            aspect-ratio: 1 / 1;
            padding: 0;
            border: 2px solid transparent;
            border-radius: 6px;
            background: #eee;
            cursor: pointer;
            overflow: hidden;
        }

        .thumbnail-button img {
            display: block;
            width: 100%;
            height: 100%;
            margin: 0;
            object-fit: cover;
        }

        .thumbnail-button[aria-current="true"] {
            border-color: #222;
        }

        .pdf-link {
            margin-top: 1.5rem;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem 0.75rem;
            }

            .carousel-toolbar {
                grid-template-columns: 2.5rem 1fr 2.5rem;
                gap: 0.5rem;
            }

            .carousel-button {
                width: 2.5rem;
                height: 2.5rem;
            }

            .thumbnail-button {
                flex-basis: 4rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Brian Lui's blog</h1>
        <nav>
            <a href="index.html">Home</a> |
            <a href="whatsthis.html">What's This?</a> |
            <a href="now.html">Now</a> |
            <a href="books.html">Books</a> |
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <article>
            <h2 class="article-title">God Emperor</h2>

            <div class="carousel" aria-roledescription="carousel" aria-label="God Emperor PDF pages">
                <div class="carousel-frame">
                    <img id="current-page" src="god_emperor_images/god_emperor_01.jpg" alt="God Emperor page 1">
                </div>

                <div class="carousel-toolbar">
                    <button class="carousel-button" id="previous-page" type="button" aria-label="Previous page">&lsaquo;</button>
                    <p class="carousel-status" id="page-status" aria-live="polite">Page 1 of 16</p>
                    <button class="carousel-button" id="next-page" type="button" aria-label="Next page">&rsaquo;</button>
                </div>

                <div class="thumbnail-strip" id="thumbnail-strip" aria-label="Pages"></div>
            </div>

            <p class="pdf-link"><a href="GodEmperor.pdf">Open the PDF</a></p>
        </article>
    </main>

    <footer>
        Thanks for reading my blog!
    </footer>

    <script>
        const pages = Array.from({ length: 16 }, (_, index) => {
            const pageNumber = index + 1;
            return {
                pageNumber,
                src: `god_emperor_images/god_emperor_${String(pageNumber).padStart(2, '0')}.jpg`,
                alt: `God Emperor page ${pageNumber}`
            };
        });

        const currentPage = document.getElementById('current-page');
        const pageStatus = document.getElementById('page-status');
        const previousPage = document.getElementById('previous-page');
        const nextPage = document.getElementById('next-page');
        const thumbnailStrip = document.getElementById('thumbnail-strip');
        let currentIndex = 0;

        const thumbnails = pages.map((page, index) => {
            const button = document.createElement('button');
            button.className = 'thumbnail-button';
            button.type = 'button';
            button.setAttribute('aria-label', `Go to page ${page.pageNumber}`);

            const image = document.createElement('img');
            image.src = page.src;
            image.alt = '';
            image.loading = 'lazy';

            button.appendChild(image);
            button.addEventListener('click', () => setPage(index));
            thumbnailStrip.appendChild(button);

            return button;
        });

        function setPage(index, updateHash = true) {
            currentIndex = (index + pages.length) % pages.length;
            const page = pages[currentIndex];

            currentPage.src = page.src;
            currentPage.alt = page.alt;
            pageStatus.textContent = `Page ${page.pageNumber} of ${pages.length}`;

            thumbnails.forEach((thumbnail, thumbnailIndex) => {
                thumbnail.setAttribute('aria-current', thumbnailIndex === currentIndex ? 'true' : 'false');
            });

            thumbnails[currentIndex].scrollIntoView({
                behavior: 'smooth',
                block: 'nearest',
                inline: 'nearest'
            });

            if (updateHash) {
                history.replaceState(null, '', `#page-${page.pageNumber}`);
            }
        }

        function pageFromHash() {
            const match = window.location.hash.match(/^#page-(\d+)$/);
            if (!match) {
                return 0;
            }

            const pageNumber = Number(match[1]);
            return pageNumber >= 1 && pageNumber <= pages.length ? pageNumber - 1 : 0;
        }

        previousPage.addEventListener('click', () => setPage(currentIndex - 1));
        nextPage.addEventListener('click', () => setPage(currentIndex + 1));

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowLeft') {
                setPage(currentIndex - 1);
            } else if (event.key === 'ArrowRight') {
                setPage(currentIndex + 1);
            } else if (event.key === 'Home') {
                setPage(0);
            } else if (event.key === 'End') {
                setPage(pages.length - 1);
            }
        });

        setPage(pageFromHash(), false);
    </script>
</body>
</html>
